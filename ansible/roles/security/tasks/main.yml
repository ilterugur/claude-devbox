---
# Hardening order is deliberate: the operator key is proven to work BEFORE root
# login is disabled, the drop-in is syntax-validated before it lands, and sshd
# is restarted only via a handler at the very end of the play.

- name: Pre-flight — confirm operator can log in with key before hardening
  ansible.builtin.command:
    cmd: >-
      ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new
      -o ConnectTimeout=15 -i {{ operator_private_key_path }}
      {{ operator_user }}@{{ ansible_host }} true
  delegate_to: localhost
  become: false
  register: _ssh_probe
  until: _ssh_probe.rc == 0
  retries: 5
  delay: 3
  changed_when: false

- name: Pre-flight — confirm operator has working passwordless sudo
  ansible.builtin.command:
    cmd: >-
      ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new
      -o ConnectTimeout=15 -i {{ operator_private_key_path }}
      {{ operator_user }}@{{ ansible_host }} sudo -n true
  delegate_to: localhost
  become: false
  register: _sudo_probe
  until: _sudo_probe.rc == 0
  retries: 5
  delay: 3
  changed_when: false
  # If this fails, the operator can't sudo — abort before locking out root.

- name: Deploy sshd hardening drop-in
  ansible.builtin.template:
    src: 99-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: Apply the sshd restart now (current connection survives it)
  ansible.builtin.meta: flush_handlers

# ── UFW — allow SSH BEFORE enabling, or you lock yourself out ─────────────────
- name: Allow OpenSSH through UFW
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Enable and start fail2ban
  ansible.builtin.systemd_service:
    name: fail2ban
    enabled: true
    state: started

# ── File bridge: the lazy-mount reverse tunnel (ssh -R) needs TCP forwarding ───
- name: Read effective sshd config
  ansible.builtin.command: sshd -T
  changed_when: false
  register: _sshd_eff

- name: Assert sshd permits TCP forwarding (devbox lazy-mount reverse tunnel needs it)
  ansible.builtin.assert:
    that: "'allowtcpforwarding no' not in (_sshd_eff.stdout | lower)"
    fail_msg: >-
      sshd has AllowTcpForwarding disabled; devbox lazy mounts (ssh -R) will not work.
      Remove that directive from the hardening config.

- name: Check sshd has an SFTP subsystem (Mutagen agent install uses scp/sftp)
  ansible.builtin.shell: >-
    grep -RqsiE '^[[:space:]]*Subsystem[[:space:]]+sftp' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/
  register: _sftp_present
  changed_when: false
  failed_when: false

- name: Assert the SFTP subsystem is present
  ansible.builtin.assert:
    that: _sftp_present.rc == 0
    fail_msg: >-
      sshd has no SFTP subsystem; Mutagen cannot install its agent (devbox sync, Mutagen engine).
      Restore `Subsystem sftp /usr/lib/openssh/sftp-server` in /etc/ssh/sshd_config.
