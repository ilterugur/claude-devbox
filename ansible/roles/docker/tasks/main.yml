---
- name: Install Docker via official convenience script
  ansible.builtin.shell:
    cmd: timeout 300 bash -c 'curl -fsSL https://get.docker.com | sh'
    creates: /usr/bin/docker

- name: Add operator to docker group
  ansible.builtin.user:
    name: "{{ operator_user }}"
    groups: docker
    append: true
  # Group membership only applies on the operator's NEXT login. Keep `docker`
  # out of later roles (runtime/projects use bun/git, not docker) so the play
  # never relies on group membership that isn't active yet this run.

- name: Enable and start docker
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started
