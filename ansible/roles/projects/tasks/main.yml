---
- name: Clone project repos (as each profile's user, with its own SSH key)
  ansible.builtin.git:
    repo: "{{ item.1.repo }}"
    dest: "/home/{{ item.0.user }}/projects/{{ item.1.name }}"
    version: "{{ item.1.branch | default('main') }}"
    # Use .get(), NOT item.1.update or item.1['update']: on ansible-core 2.21 both
    # resolve 'update' to the dict's built-in .update() METHOD (which `default` can't
    # rescue, since a method is "defined") and crash with a builtin_function_or_method
    # error. .get('update', false) does a real key lookup.
    update: "{{ item.1.get('update', false) }}" # never clobber Claude's edits
    accept_hostkey: true
  become_user: "{{ item.0.user }}"
  environment:
    GIT_TERMINAL_PROMPT: "0" # fail fast instead of hanging on private repos
  loop: "{{ profiles | subelements('projects', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.user }}/{{ item.1.name }}"
  register: clone_results
  failed_when: false # don't abort the whole run if a key isn't on GitHub yet

- name: "Report any clones that failed"
  # Only blame a missing GitHub SSH key on a REAL auth/permission error; for anything
  # else (e.g. a templating crash) surface the git module's actual message instead of
  # masking it with misleading SSH-key advice.
  ansible.builtin.debug:
    msg: >-
      {% if (item.msg | default('')) is search('Permission denied|publickey|[Aa]uthentication failed|access rights|Could not read from remote|Host key verification') %}
      Clone failed for {{ item.item.0.user }}/{{ item.item.1.name }} — add that
      profile's printed SSH public key to its GitHub account, then re-run.
      {% else %}
      Clone failed for {{ item.item.0.user }}/{{ item.item.1.name }}: {{ item.msg | default('see the task output above') }}
      {% endif %}
  loop: "{{ clone_results.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list }}"
  loop_control:
    label: "{{ item.item.0.user }}/{{ item.item.1.name }}"

# Gate the post-clone steps on a REAL remote check (the `exists` Jinja test runs
# on the controller, not the box, so it can't be used to detect a remote clone).
- name: Check which project repos are present on the box
  ansible.builtin.stat:
    path: "/home/{{ item.0.user }}/projects/{{ item.1.name }}/.git"
  become_user: "{{ item.0.user }}"
  loop: "{{ profiles | subelements('projects', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.user }}/{{ item.1.name }}"
  register: repo_git

- name: Pre-accept Claude's workspace-trust + Remote Control dialogs (the RC server runs claude headlessly)
  # An untrusted workspace, or the first-run "Enable Remote Control?" prompt, makes
  # `claude remote-control` block forever in the non-interactive service. Seed the
  # flags in the profile's ~/.claude.json so the always-on server connects on its own.
  # Trust the project dir AND the profile's HOME — the `devbox` command launches claude
  # from a login shell (cwd = HOME), which would otherwise prompt to trust the folder.
  ansible.builtin.command:
    cmd: >-
      python3 -c 'import json,os,sys;
      p=os.path.expanduser("~/.claude.json");
      d=json.load(open(p)) if os.path.exists(p) else {};
      d["remoteDialogSeen"]=True;
      pr=d.setdefault("projects",{});
      pr.setdefault(sys.argv[1],{})["hasTrustDialogAccepted"]=True;
      pr.setdefault(os.path.expanduser("~"),{})["hasTrustDialogAccepted"]=True;
      json.dump(d,open(p,"w"),indent=2)'
      "/home/{{ item.0.user }}/projects/{{ item.1.name }}"
  become_user: "{{ item.0.user }}"
  environment:
    HOME: "/home/{{ item.0.user }}"
  loop: "{{ profiles | subelements('projects', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.user }}/{{ item.1.name }}"
    index_var: ridx
  when: repo_git.results[ridx].stat.exists
  changed_when: false

- name: Trust each repo's own mise config (so its pinned versions are honored)
  ansible.builtin.command:
    cmd: "mise trust /home/{{ item.0.user }}/projects/{{ item.1.name }}"
  become_user: "{{ item.0.user }}"
  environment:
    HOME: "/home/{{ item.0.user }}"
    MISE_YES: "1"
  loop: "{{ profiles | subelements('projects', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.user }}/{{ item.1.name }}"
    index_var: ridx
  when: repo_git.results[ridx].stat.exists
  changed_when: false

- name: Install each repo's pinned toolchain (mise reads the repo's mise.toml/.tool-versions/.nvmrc)
  ansible.builtin.command:
    cmd: "mise -C /home/{{ item.0.user }}/projects/{{ item.1.name }} install --yes"
  become_user: "{{ item.0.user }}"
  environment:
    HOME: "/home/{{ item.0.user }}"
    MISE_YES: "1"
  register: repo_mise
  loop: "{{ profiles | subelements('projects', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.user }}/{{ item.1.name }}"
    index_var: ridx
  when: repo_git.results[ridx].stat.exists
  changed_when: >-
    (repo_mise.stdout | default('')) is search('install(ing|ed)')
    or (repo_mise.stderr | default('')) is search('install(ing|ed)')

- name: Install dependencies (bun via mise) per project
  ansible.builtin.command:
    cmd: "mise exec -- bun install"
    chdir: "/home/{{ item.0.user }}/projects/{{ item.1.name }}"
  become_user: "{{ item.0.user }}"
  environment:
    HOME: "/home/{{ item.0.user }}"
  loop: "{{ profiles | subelements('projects', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.user }}/{{ item.1.name }}"
    index_var: ridx
  when:
    - item.1.get('install', true)
    - repo_git.results[ridx].stat.exists
  changed_when: false

- name: Scaffold .env files from .env.example (never overwrites)
  ansible.builtin.shell:
    executable: /bin/bash # need bash: `read -d ''` is unsupported by dash (/bin/sh on Debian/Ubuntu)
    cmd: >-
      find "/home/{{ item.0.user }}/projects/{{ item.1.name }}" -name '.env.example'
      -not -path '*/node_modules/*' -print0 |
      while IFS= read -r -d '' f; do t="${f%.example}"; [ -f "$t" ] || cp "$f" "$t"; done
  become_user: "{{ item.0.user }}"
  loop: "{{ profiles | subelements('projects', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.user }}/{{ item.1.name }}"
    index_var: ridx
  when: repo_git.results[ridx].stat.exists
  changed_when: false
