---
- name: Create profile users
  ansible.builtin.user:
    name: "{{ item.user }}"
    shell: /bin/bash
    create_home: true
    state: present
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Create per-profile .ssh dirs
  ansible.builtin.file:
    path: "/home/{{ item.user }}/.ssh"
    state: directory
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0700"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

# This is LOGIN auth only: your laptop key lets you `ssh work@box` (so the desktop
# app / VS Code Remote-SSH land directly in that profile's env). It does NOT change
# the profile's GIT identity — git push/pull uses the profile's OWN key generated
# below. The two are independent; profile identity stays isolated.
- name: Allow your laptop key to SSH in AS each profile (for desktop app / Remote-SSH)
  ansible.posix.authorized_key:
    user: "{{ item.user }}"
    key: "{{ operator_ssh_pubkey }}"
    state: present
    exclusive: false
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Generate a dedicated git SSH key per profile
  ansible.builtin.command:
    cmd: "ssh-keygen -t ed25519 -N '' -C '{{ item.git_email }}' -f /home/{{ item.user }}/.ssh/id_ed25519"
    creates: "/home/{{ item.user }}/.ssh/id_ed25519"
  become_user: "{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Trust github.com host key for each profile
  ansible.builtin.known_hosts:
    path: "/home/{{ item.user }}/.ssh/known_hosts"
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com 2>/dev/null') }}"
    state: present
  become_user: "{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  failed_when: false # offline provisioning shouldn't block; git clone will warn

- name: Route GitHub SSH over port 443 for each profile
  # Many cloud networks (e.g. Hetzner) block outbound TCP/22. ssh.github.com:443
  # is GitHub's officially supported SSH endpoint and works everywhere, so we
  # route github.com over it unconditionally — harmless where 22 is open too.
  ansible.builtin.copy:
    dest: "/home/{{ item.user }}/.ssh/config"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0600"
    content: |
      # Managed by Ansible (claude-devbox).
      Host github.com
          HostName ssh.github.com
          Port 443
          User git
          StrictHostKeyChecking accept-new
  become_user: "{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Write per-profile git identity
  ansible.builtin.copy:
    dest: "/home/{{ item.user }}/.gitconfig"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0644"
    content: |
      [user]
          name = {{ item.git_name }}
          email = {{ item.git_email }}
      [init]
          defaultBranch = main
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Create per-profile ~/.claude, ~/projects, and file-bridge dirs (~/mnt, ~/sync)
  ansible.builtin.file:
    path: "/home/{{ item.0.user }}/{{ item.1.path }}"
    state: directory
    owner: "{{ item.0.user }}"
    group: "{{ item.0.user }}"
    mode: "{{ item.1.mode }}"
  loop: "{{ profiles | product([
            {'path': '.claude', 'mode': '0700'},
            {'path': 'projects', 'mode': '0755'},
            {'path': 'mnt', 'mode': '0700'},
            {'path': 'sync', 'mode': '0700'}]) | list }}"
  loop_control:
    label: "{{ item.0.user }} {{ item.1.path }}"

- name: Mark each profile as claude-devbox-managed (for declarative prune)
  ansible.builtin.copy:
    dest: "/home/{{ item.user }}/.claude-devbox-managed"
    content: "managed by claude-devbox\n"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0644"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Install / update the toolchain for each profile (mise)
  ansible.builtin.command: mise install --yes
  environment:
    MISE_YES: "1"
    HOME: "/home/{{ item.user }}" # pin so tools land in the user's data dir, not root's
  become_user: "{{ item.user }}"
  register: mise_install
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  # Best-effort change detection: mise prints "installing/installed" only when it
  # actually fetches a version (it's silent on a no-op), so re-runs after a version
  # bump correctly report "changed".
  changed_when: >-
    (mise_install.stdout | default('')) is search('install(ing|ed)')
    or (mise_install.stderr | default('')) is search('install(ing|ed)')
  tags: [runtime, mise] # so `--tags runtime` applies a version bump end-to-end

- name: Prune old toolchain versions after an upgrade (optional, off by default)
  ansible.builtin.command: mise prune --yes
  environment:
    HOME: "/home/{{ item.user }}"
  become_user: "{{ item.user }}"
  register: mise_pruned
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  when: mise_prune | default(false) | bool
  changed_when: "(mise_pruned.stdout | default('')) is search('(?i)remov')"
  tags: [runtime, mise]

- name: Install Claude Code per profile (native installer -> ~/.local/bin)
  ansible.builtin.shell:
    cmd: "timeout 600 bash -c 'curl -fsSL https://claude.ai/install.sh | bash'"
    creates: "/home/{{ item.user }}/.local/bin/claude"
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Verify Claude Code works for each profile (catches a truncated install)
  ansible.builtin.command: "/home/{{ item.user }}/.local/bin/claude --version"
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  changed_when: false

- name: Read each profile's git public key
  ansible.builtin.slurp:
    src: "/home/{{ item.user }}/.ssh/id_ed25519.pub"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  register: profile_pubkeys

- name: Public keys to add to each profile's GitHub account
  ansible.builtin.debug:
    msg: "{{ item.item.user }}  →  {{ item.content | b64decode | trim }}"
  loop: "{{ profile_pubkeys.results }}"
  loop_control:
    label: "{{ item.item.user }}"
