---
# ── claude_remote role defaults ───────────────────────────────────────────────
# Override any of these in group_vars/all.yml. See group_vars/all.example.yml for
# the documented, user-facing descriptions.

# Self-heal: run each RC service as a monitored process that systemd auto-restarts
# on any death (OOM / kill / crash). false = legacy oneshot (stays down after OOM).
rc_autorestart: true
rc_restart_sec: 10            # delay before systemd restarts a crashed RC unit
rc_start_limit_interval: 600  # window for the restart-burst cap (seconds)
rc_start_limit_burst: 10      # max restarts per window before systemd gives up

# Boot/recovery resume: after an RC service (re)starts, scan its worktrees for
# sessions interrupted by a crash and bring each back — resumed from disk,
# re-registered on the phone, with any aborted Workflow resumed from its journal.
rc_resume_on_boot: true
rc_resume_lookback_h: 12      # only resume sessions active within this many hours
rc_resume_max_concurrent: 2   # max sessions actively booting at once (OOM guard)
rc_resume_settle_sec: 20      # pause between launches for memory to settle
rc_resume_min_free_mb: 1200   # wait for at least this much free RAM before next launch
rc_resume_max_attempts: 3     # quarantine a session after N resumes within an hour
rc_resume_timeout_sec: 1800   # systemd TimeoutStartSec for the staggered orchestrator

# Persist the per-profile "I accept that workflows use many agents/tokens" consent
# (~/.claude.json skipWorkflowUsageWarning), so auto-resumed workflows continue
# without a per-run confirmation prompt. Only suppresses that usage warning — it
# does NOT bypass edit/bash permissions. Defaults to on when resume is enabled.
rc_resume_skip_workflow_warning: "{{ rc_resume_on_boot | default(true) }}"
