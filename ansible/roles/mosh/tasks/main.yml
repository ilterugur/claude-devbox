---
# On by default (mosh_enabled: true; set false to skip). mosh + tmux gives a
# roaming-resilient terminal: mosh survives network drops and IP changes (mobile,
# phone switching cells/Wi-Fi), while tmux keeps the session — and the `claude`
# running in it — alive on the box across reconnects. This is the resilient
# alternative to Claude Desktop's integrated SSH remote, which drops the session
# on disconnect with no resume (anthropics/claude-code#49790). tmux is already
# installed (the Remote Control service uses it).

- name: Install mosh + the locales package
  # mosh-server adopts the locale the client forwards (e.g. macOS sends en_US.UTF-8);
  # if that locale isn't generated on the box, mosh-server fails to start with
  # "Did not find mosh server startup message". The `locales` package lets us generate it.
  ansible.builtin.apt:
    name:
      - mosh
      - locales
    state: present
    update_cache: true

- name: Generate the configured UTF-8 locale(s)
  # mosh-server adopts the locale forwarded by the client (via mosh-server -l ...), so
  # that locale must exist here. The `devbox` connect command pins LC_ALL to the first
  # of these client-side, which is the real fix for clients (e.g. macOS) that forward a
  # region locale like en_TR.UTF-8 that Linux can't provide. Add more here if you want a
  # different working locale available (note: a Turkish locale's dotless-i case-folding
  # can break build tools — keep en_US.UTF-8 as the default).
  community.general.locale_gen:
    name: "{{ item }}"
    state: present
  loop: "{{ locales | default(['en_US.UTF-8']) }}"

- name: Allow mosh (UDP 60000-61000) over Tailscale
  # Scoped to the tailscale0 interface so the UDP range is reachable only from your
  # tailnet, never the public internet — connect to the box's Tailscale address.
  community.general.ufw:
    rule: allow
    direction: in
    interface: tailscale0
    proto: udp
    port: "60000:61000"
    comment: mosh over tailscale
