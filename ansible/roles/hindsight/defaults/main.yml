---
# ── Provider configuration: LLM / embeddings / reranker, each independent ──────
# The default LLM (hindsight_llm_provider / _api_key / _model / _base_url, set in
# group_vars/all.yml) is used by EVERY memory operation. On top of that you can override
# any single operation, swap the embedder, or add a reranker — each can point at a
# DIFFERENT provider (e.g. OpenRouter for the LLM, OpenAI text-embedding-3-small for the
# embedder, Cohere for the reranker). It all renders into ~/.hindsight/llm.env (0600),
# which the daemon inherits. Restart the daemon to pick up changes. See docs/memory.md
# → "Splitting providers". Defaults below keep the original behaviour (single LLM, local
# embedder, no reranker) until you set them.

# Optional concurrency cap for the default LLM ("" = provider/daemon default).
hindsight_llm_max_concurrent: ""

# Per-operation LLM overrides. Each is a dict {provider, model, api_key, base_url};
# empty {} = use the default LLM. e.g. a cheap model for retain, a stronger one for reflect.
hindsight_retain_llm: {}
hindsight_reflect_llm: {}
hindsight_consolidation_llm: {}

# Embedder. Empty {} = the daemon's built-in LOCAL embedder (memory text never leaves the
# box). Set {provider, model, api_key, base_url} to override — a REMOTE provider (openai,
# cohere, …) sends memory text off the box. For a LOCAL multilingual embedder use the
# 'onnx' provider via hindsight_extra_env (its params don't fit the model/key/url shape;
# see docs/memory.md and group_vars/all.example.yml).
hindsight_embeddings: {}

# Reranker (optional; off by default). dict {provider, model, api_key, base_url, max_candidates}.
hindsight_reranker: {}

# Search backends (optional; "" = daemon defaults). Text-search extension
# (native/pgroonga/pg_search/…) and vector extension (pgvector/vchord/…).
hindsight_text_search_extension: ""
hindsight_vector_extension: ""

# Raw escape hatch: a map of any HINDSIGHT_API_* key -> value, rendered verbatim into the
# env file (emitted last, so it wins). For knobs without a dedicated var — onnx embedding
# params, HINDSIGHT_API_LLM_OUTPUT_LANGUAGE, etc.
hindsight_extra_env: {}

# ── Bank-level memory tuning (see docs/memory.md) ─────────────────────────────
# Keeps memory focused on "important, durable things" instead of "everything".
# retainMission/bankMission are written into the per-profile claude-code.json and
# applied to the shared bank by the plugin on first retain. observations_mission is
# applied best-effort via the daemon's HTTP API (the plugin doesn't manage it) — it
# takes effect whenever the daemon is reachable during a run. Override any of these
# in group_vars/all.yml.

# How often a session flushes a retain. LOWER = more frequent = noisier (1 = every turn).
# The whole session is sent each time (retainMode full-session) and a forced final retain
# at session end captures short sessions, so a HIGHER value just means fewer redundant
# re-extractions — less duplication, no data loss. Plugin default is 10.
hindsight_retain_every_n_turns: 10

# reflect_mission — the bank's persona used when surfacing/reflecting on memory.
hindsight_bank_mission: >-
  You are the long-term memory of a personal coding assistant for one user. Surface
  durable, user-specific knowledge — the user's preferences and conventions, their
  projects' architecture and configuration, and decisions they made — and ignore
  transient operational detail.

# retain_mission — what the extractor pulls from each conversation.
hindsight_retain_mission: >-
  You are curating a long-term personal memory for one user across their projects.
  Extract ONLY durable, user-specific knowledge that will still matter weeks from now:
  (a) the user's own preferences, conventions, working style, and decisions — including
  conventions they adopt about tools or workflows (e.g. 'keeps plan docs untracked',
  'uses pnpm here'); (b) concrete stable facts about their specific systems — final
  configuration and infrastructure state, project architecture, and the key technical
  decisions they made together with their rationale (even when the rationale references
  a past problem); (c) lasting context about the user, their projects, environment, and
  recurring needs. Do NOT store: documentation or mechanics of skills, frameworks, tools,
  methodologies, or workflows — even when the assistant is following them (how to
  brainstorm, write plans, use git worktrees, run TDD, select models, generic process
  steps or decision flows) — UNLESS the user adopts it as their own convention or states
  a preference about it (then keep the user's choice, not the generic mechanics). Also
  drop: commit hashes, branch names, merges, pushes, PR/issue numbers, repo state;
  test/build/lint/verification results; task progress, completion logs, and one-time
  approvals or option-selections such as 'chose Option A' (but if a selection encodes a
  durable decision, keep that decision, not the label); transient errors, one-off
  debugging state, the step-by-step of doing or configuring something, and per-session or
  operational summaries; greetings and social exchange; and anything likely stale within
  ~7 days.

# observations_mission — what the consolidation layer turns into long-term observations.
hindsight_observations_mission: >-
  Consolidate into long-term observations only durable, user-specific facts: the user's
  stable preferences and conventions, their projects' architecture and final
  configuration, and the lasting decisions they made (with rationale). Never form
  observations from skill/framework/tool documentation, git/test/task-progress logs,
  transient errors, or session summaries. Keep one canonical observation per fact — do
  not restate the same fact in multiple phrasings or languages.

# Entity-label auto-tagging: the extractor classifies each memory from its CONTENT and
# writes a filterable tag. Content-derived, so it works across ALL clients (Claude Code,
# Codex, AND Hermes) — not just cwd-aware ones. `tag: true` makes the label a filterable
# tag (recall with tags=["project:<name>"]). NOTE: the daemon caches the labels schema,
# so a daemon restart is needed for changes to take effect. Override/extend in all.yml.
hindsight_entity_labels:
  - key: project
    description: >-
      The project or git repository the fact concerns. Use the canonical repository name;
      leave empty when the fact is not project-specific.
    type: text
    tag: true
    values: []

# Consolidation dedup similarity threshold (HINDSIGHT_API_CONSOLIDATION_DEDUP_THRESHOLD):
# the cosine similarity at/above which a candidate pair is sent to a focused LLM
# "merge or keep" call (the LLM reads both texts and respects number/negation/entity
# differences). lower = more candidate pairs reach the LLM (1.0 = off). Hindsight's own
# default is 0.97 (the value the maintainers ship); we use a slightly looser 0.95 to also
# catch close paraphrase duplicates while staying conservative — the LLM gate makes the
# merge safe, but a smaller extraction model errs more on borderline pairs, so we don't go
# lower. Daemon-global (set on the embed profile env). NOTE: dedup only compares within the
# same tag scope, so the language-normalized missions above (English-only) matter — they
# keep semantically identical facts in one language so they actually reach this gate.
hindsight_dedup_threshold: "0.95"
