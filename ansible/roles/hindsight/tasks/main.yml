---
# On by default (hindsight_enabled: true; set false to skip). Per profile: install
# the Vectorize Hindsight Claude Code plugin, configure a SINGLE profile-wide memory
# bank (personal-assistant style — remembers you across all projects), disable the
# plugin's own auto-retain, and install a custom Stop hook that retains WITH verti-
# style tags (source/profile/project) so memories can be filtered later. Generic LLM
# provider via the HINDSIGHT_API_LLM_* env file. Embeddings are local (daemon default).

- name: Ensure ~/.hindsight exists per profile
  ansible.builtin.file:
    path: "/home/{{ item.user }}/.hindsight"
    state: directory
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0700"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Render the per-profile LLM env file (0600 — keeps the key off other profiles)
  ansible.builtin.template:
    src: llm.env.j2
    dest: "/home/{{ item.user }}/.hindsight/llm.env"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0600"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
    index_var: idx

- name: Write the Hindsight Claude Code bank config per profile
  ansible.builtin.template:
    src: claude-code.json.j2
    dest: "/home/{{ item.user }}/.hindsight/claude-code.json"
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0600"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

# retainMission/bankMission ride in claude-code.json (the plugin applies them to the
# bank on first retain). observations_mission is NOT a plugin config key, so set it
# directly on the bank via the daemon's HTTP API. Best-effort: the daemon isn't running
# at provision time, so this no-ops then and converges on any later run while a session
# (and thus the daemon) is up. Skipped in per-project mode (each project = its own bank).
- name: Apply bank observations_mission + entity-label auto-tagging via the daemon (best-effort)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ (hindsight_base_port | default(9077)) + idx }}/v1/default/banks/{{ item.user }}/config"
    method: PATCH
    body_format: json
    body:
      updates:
        observations_mission: "{{ hindsight_observations_mission }}"
        entity_labels: "{{ hindsight_entity_labels }}"
        entities_allow_free_form: true
    status_code: [200, 201]
    timeout: 15
  become_user: "{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
    index_var: idx
  when: not (hindsight_per_project | default(false))
  failed_when: false

# Daemon-global consolidation dedup threshold (not a bank-config key, not forwarded by the
# plugin) — set it on the embed daemon profile env. Best-effort: needs the embed profile to
# exist (created on first session); no-ops otherwise and converges on a later run.
- name: Set the Hindsight consolidation dedup threshold on the daemon profile (best-effort)
  ansible.builtin.command:
    cmd: >-
      uvx hindsight-embed -p claude-code profile set-env claude-code
      HINDSIGHT_API_CONSOLIDATION_DEDUP_THRESHOLD {{ hindsight_dedup_threshold | default('0.95') }}
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  failed_when: false
  changed_when: false

- name: Source the Hindsight env file from each profile's interactive shell
  ansible.builtin.blockinfile:
    path: "/home/{{ item.user }}/.bashrc"
    create: true
    owner: "{{ item.user }}"
    group: "{{ item.user }}"
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED BLOCK (claude-devbox hindsight)"
    block: |
      [ -f "$HOME/.hindsight/llm.env" ] && set -a && . "$HOME/.hindsight/llm.env" && set +a
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Deploy the custom tagging retain hook (shared, all profiles)
  ansible.builtin.copy:
    src: hindsight-retain-tagged.py
    dest: /usr/local/bin/hindsight-retain-tagged
    owner: root
    group: root
    mode: "0755"
  when: not (hindsight_per_project | default(false))

# Pre-clone the marketplace repo ourselves and register it from the LOCAL path:
# `claude plugin marketplace add <owner/repo>` makes Claude do its own network clone,
# which is broken in some Claude Code versions (ERR_STREAM_PREMATURE_CLOSE) even though
# plain `git clone` works. Cloning here and adding the local path sidesteps that.
- name: Clone the Hindsight plugin marketplace per profile (local, avoids Claude's buggy network clone)
  ansible.builtin.git:
    repo: https://github.com/vectorize-io/hindsight.git
    dest: "/home/{{ item.user }}/.claude/plugins/marketplaces/vectorize-io-hindsight"
    version: main
    depth: 1
    force: true
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"

- name: Register the Hindsight plugin marketplace from the local clone (idempotent)
  ansible.builtin.command:
    cmd: "/home/{{ item.user }}/.local/bin/claude plugin marketplace add /home/{{ item.user }}/.claude/plugins/marketplaces/vectorize-io-hindsight"
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  register: hs_marketplace
  changed_when: >-
    'already' not in (hs_marketplace.stdout | default('') | lower)
    and 'already' not in (hs_marketplace.stderr | default('') | lower)
  failed_when:
    - hs_marketplace.rc != 0
    - "'already' not in (hs_marketplace.stdout | default('') | lower)"
    - "'already' not in (hs_marketplace.stderr | default('') | lower)"

- name: Install the hindsight-memory plugin per profile (idempotent)
  ansible.builtin.command:
    cmd: "/home/{{ item.user }}/.local/bin/claude plugin install hindsight-memory"
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  register: hs_install
  changed_when: >-
    'already' not in (hs_install.stdout | default('') | lower)
    and 'already' not in (hs_install.stderr | default('') | lower)
  failed_when:
    - hs_install.rc != 0
    - "'already' not in (hs_install.stdout | default('') | lower)"
    - "'already' not in (hs_install.stderr | default('') | lower)"

- name: Register the custom tagging Stop hook in each profile's settings.json
  ansible.builtin.command:
    cmd: >-
      python3 -c 'import json,os;
      p=os.path.expanduser("~/.claude/settings.json");
      d=json.load(open(p)) if os.path.exists(p) else {};
      h=d.setdefault("hooks",{});
      stop=h.setdefault("Stop",[]);
      cmd="python3 /usr/local/bin/hindsight-retain-tagged";
      present=any(any(i.get("command")==cmd for i in g.get("hooks",[])) for g in stop);
      stop.append({"hooks":[{"type":"command","command":cmd,"timeout":20}]}) if not present else None;
      json.dump(d,open(p,"w"),indent=2)'
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  when: not (hindsight_per_project | default(false))
  changed_when: false

# ── Optional Tailscale-only exposure (hindsight_expose_tailscale) ──────────────
# Exposes each profile's loopback daemon to your TAILNET only (never public) via
# Tailscale Serve: https://<node>.<tailnet>.ts.net:<serve_port> -> 127.0.0.1:<daemon>.
# Tailnet-gated by Tailscale itself (no 0.0.0.0 bind, no UFW rule), with a valid TLS
# cert and a real hostname — the same mechanism used for other devbox web apps.

# Legacy cleanup: earlier versions exposed via a socat proxy + UFW. Remove it so a box
# provisioned before this change converges. Idempotent — no-ops if it was never there.
- name: Remove the legacy Hindsight socat proxy service (superseded by Tailscale Serve)
  ansible.builtin.systemd_service:
    name: "hindsight-proxy-{{ item.user }}.service"
    state: stopped
    enabled: false
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  failed_when: false

- name: Remove the legacy Hindsight socat unit file
  ansible.builtin.file:
    path: "/etc/systemd/system/hindsight-proxy-{{ item.user }}.service"
    state: absent
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  notify: Reload systemd

- name: Remove the legacy Hindsight socat UFW rule
  community.general.ufw:
    rule: allow
    direction: in
    interface: tailscale0
    proto: tcp
    port: "{{ (hindsight_expose_base_port | default(19077)) + idx }}"
    delete: true
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
    index_var: idx
  failed_when: false

- name: Read current Tailscale Serve config
  ansible.builtin.command: tailscale serve status
  register: hs_serve_status
  changed_when: false
  failed_when: false

- name: Expose each profile's Hindsight daemon via Tailscale Serve (tailnet only)
  ansible.builtin.command:
    cmd: >-
      tailscale serve --bg
      --https={{ (hindsight_serve_https_port | default(9443)) + idx }}
      http://127.0.0.1:{{ (hindsight_base_port | default(9077)) + idx }}
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
    index_var: idx
  when:
    - hindsight_expose_tailscale | default(false)
    - (':' ~ ((hindsight_serve_https_port | default(9443)) + idx)) not in (hs_serve_status.stdout | default(''))
  changed_when: true

- name: Disable Tailscale Serve for Hindsight when exposure is off
  ansible.builtin.command:
    cmd: "tailscale serve --https={{ (hindsight_serve_https_port | default(9443)) + idx }} off"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
    index_var: idx
  when:
    - not (hindsight_expose_tailscale | default(false))
    - (':' ~ ((hindsight_serve_https_port | default(9443)) + idx)) in (hs_serve_status.stdout | default(''))
  changed_when: true

# ── Optional control-plane web UI (hindsight_control_plane) ────────────────────
# A per-profile Hindsight Control Plane web app (npx @vectorize-io/hindsight-control-plane)
# fronting that profile's daemon — a visual memory browser. Bound to the tailnet
# (0.0.0.0; public blocked by UFW), reachable at http://<node>.<tailnet>.ts.net:<ui_port>.
# Served directly (not via Tailscale Serve) — the app mishandles TLS-terminating proxies.

# Legacy cleanup: an early manual setup used a single (non-per-profile)
# hindsight-control-plane.service. Remove it so the per-profile unit doesn't collide
# on the UI port. Idempotent — no-ops if it was never there.
- name: Remove the legacy non-per-profile Hindsight Control Plane service
  ansible.builtin.systemd_service:
    name: "hindsight-control-plane.service"
    state: stopped
    enabled: false
  failed_when: false

- name: Remove the legacy non-per-profile Hindsight Control Plane unit file
  ansible.builtin.file:
    path: /etc/systemd/system/hindsight-control-plane.service
    state: absent
  notify: Reload systemd

- name: Render the Hindsight Control Plane unit per profile
  ansible.builtin.template:
    src: hindsight-control-plane.service.j2
    dest: "/etc/systemd/system/hindsight-control-plane-{{ item.user }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
    index_var: idx
  when: hindsight_control_plane | default(false)
  notify: Reload systemd

- name: Enable and start the Hindsight Control Plane per profile
  ansible.builtin.systemd_service:
    name: "hindsight-control-plane-{{ item.user }}.service"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  when: hindsight_control_plane | default(false)

- name: Stop the Hindsight Control Plane when disabled
  ansible.builtin.systemd_service:
    name: "hindsight-control-plane-{{ item.user }}.service"
    state: stopped
    enabled: false
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  when: not (hindsight_control_plane | default(false))
  failed_when: false

- name: Remove the Hindsight Control Plane unit file when disabled
  ansible.builtin.file:
    path: "/etc/systemd/system/hindsight-control-plane-{{ item.user }}.service"
    state: absent
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  when: not (hindsight_control_plane | default(false))
  notify: Reload systemd
