---
# On by default (browser_automation: true; set false to skip). Server-side, headless
# browser use for the agent: install Google Chrome and wire two MCP servers into each
# profile — Playwright (drive the browser: navigate/click/snapshot, console + network)
# and Chrome DevTools (deeper debugging: performance traces / Web Vitals, throttling).
# Both run the system Chrome headless. This is NOT "Claude in Chrome" (that extension
# is client-side, on your client).

- name: Install supporting fonts for headless Chrome rendering
  ansible.builtin.apt:
    name:
      - fonts-liberation
      - fonts-noto-core
      - fonts-noto-color-emoji
      - dbus-x11
    state: present
    update_cache: true

- name: Check whether Google Chrome is already installed
  ansible.builtin.stat:
    path: /usr/bin/google-chrome-stable
  register: _chrome_bin

# Install from the official .deb so Chrome self-manages its own apt repo/key — we
# never add a repo ourselves (doing so collides with Chrome's own google-chrome.sources).
- name: Install Google Chrome from the official .deb (pulls deps + its own repo)
  when: not _chrome_bin.stat.exists
  block:
    - name: Download the current Google Chrome .deb
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome-stable_current_amd64.deb
        mode: "0644"

    - name: Install the Google Chrome .deb
      ansible.builtin.apt:
        deb: /tmp/google-chrome-stable_current_amd64.deb
        state: present

    - name: Remove the downloaded .deb
      ansible.builtin.file:
        path: /tmp/google-chrome-stable_current_amd64.deb
        state: absent

- name: Wire browser MCP servers into each profile (user scope ~/.claude.json)
  # Idempotent: sets only the "playwright" + "chrome-devtools" mcpServers entries,
  # preserving any others (e.g. agentmemory). Both launch via npx at runtime; node/npx
  # resolve through mise shims for the Remote Control service and interactive sessions.
  #   playwright       — drive the headless system Chrome (navigate/click/snapshot,
  #                      console + network inspection). The default for automation.
  #   chrome-devtools  — deeper CDP debugging: performance traces / Web Vitals,
  #                      network bodies+timing, CPU/network throttling.
  ansible.builtin.command:
    cmd: >-
      python3 -c 'import json,os;
      p=os.path.expanduser("~/.claude.json");
      d=json.load(open(p)) if os.path.exists(p) else {};
      m=d.setdefault("mcpServers",{});
      m["playwright"]={"command":"npx","args":["-y","@playwright/mcp@latest","--browser","chrome","--headless","--no-sandbox"]};
      m["chrome-devtools"]={"command":"npx","args":["-y","chrome-devtools-mcp@latest","--headless","--isolated","--channel","stable","--chrome-arg=--no-sandbox","--chrome-arg=--disable-setuid-sandbox","--no-usage-statistics"]};
      json.dump(d,open(p,"w"),indent=2)'
  become_user: "{{ item.user }}"
  environment:
    HOME: "/home/{{ item.user }}"
  loop: "{{ profiles }}"
  loop_control:
    label: "{{ item.user }}"
  changed_when: false
