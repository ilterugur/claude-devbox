- name: Remove the legacy hand-built fallback Chrome unit if present
  ansible.builtin.systemd_service:
    name: hermes-chrome.service
    state: stopped
    enabled: false
  failed_when: false

- name: Delete the legacy unit file
  ansible.builtin.file:
    path: /etc/systemd/system/hermes-chrome.service
    state: absent
  notify: Reload systemd

- name: Install HAProxy
  ansible.builtin.apt:
    name: haproxy
    state: present
    update_cache: true

- name: Deploy the CDP failover HAProxy config
  ansible.builtin.template:
    src: haproxy-cdp.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: "haproxy -c -f %s"
  notify: Reload haproxy

- name: Enable and start HAProxy
  ansible.builtin.systemd_service:
    name: haproxy
    enabled: true
    state: started

- name: Deploy fallback headless Chrome unit
  ansible.builtin.template:
    src: devbox-fallback-chrome.service.j2
    dest: /etc/systemd/system/devbox-fallback-chrome.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start the fallback Chrome service
  ansible.builtin.systemd_service:
    name: devbox-fallback-chrome.service
    enabled: true
    state: started
    daemon_reload: true
