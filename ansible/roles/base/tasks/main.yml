---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: dist

- name: Install base packages
  ansible.builtin.apt:
    name:
      - git
      - curl
      - ca-certificates
      - ufw
      - fail2ban
      - tmux
      - unzip
      - rsync
      - build-essential
      - pkg-config
      - sshfs
      - fuse3
    state: present

- name: Create non-root sudo user
  ansible.builtin.user:
    name: "{{ operator_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true
    state: present

- name: Allow operator passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ operator_user }}"
    content: "{{ operator_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  no_log: true

- name: Push operator SSH public key
  ansible.posix.authorized_key:
    user: "{{ operator_user }}"
    key: "{{ operator_ssh_pubkey }}"
    state: present
    exclusive: false

# ── Swapfile (idempotent, resize-aware) ──────────────────────────────────────
- name: Stat existing swapfile
  ansible.builtin.stat:
    path: "{{ swap_file }}"
  register: swap_stat

# A bare `creates:` guard never resizes an existing file, so a changed swap_size
# was silently ignored. Tear the old file down first when the size differs.
- name: Detect swap size change
  ansible.builtin.set_fact:
    swap_resize: "{{ swap_stat.stat.exists and swap_stat.stat.size != (swap_size | human_to_bytes) }}"

- name: Disable old swapfile before resize
  ansible.builtin.command: "swapoff {{ swap_file }}"
  when: swap_resize | bool
  changed_when: true

- name: Remove old swapfile before resize
  ansible.builtin.file:
    path: "{{ swap_file }}"
    state: absent
  when: swap_resize | bool

- name: Allocate swapfile
  ansible.builtin.command: "fallocate -l {{ swap_size }} {{ swap_file }}"
  args:
    creates: "{{ swap_file }}"
  register: swap_created

- name: Secure swapfile permissions
  ansible.builtin.file:
    path: "{{ swap_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Format swapfile
  ansible.builtin.command: "mkswap {{ swap_file }}"
  when: swap_created.changed
  changed_when: true

- name: Persist swap in /etc/fstab
  ansible.posix.mount:
    path: none
    src: "{{ swap_file }}"
    fstype: swap
    opts: sw
    state: present

- name: Get active swap devices
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: active_swap
  changed_when: false

- name: Enable swap (idempotent — also recovers if it was turned off)
  ansible.builtin.command: "swapon {{ swap_file }}"
  when: swap_file not in active_swap.stdout
  changed_when: true

# ── zram (compressed RAM swap) ───────────────────────────────────────────────
# Used BEFORE the disk swapfile (higher priority). Gives heavy builds extra
# effective memory at ~2-3x compression so they complete under pressure instead
# of getting OOM-killed — no hardware upgrade. Gated by zram_enabled.
- name: Install zram-tools
  ansible.builtin.apt:
    name: zram-tools
    state: present
  when: zram_enabled | default(false)

- name: Configure zramswap
  ansible.builtin.copy:
    dest: /etc/default/zramswap
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible (claude-devbox).
      ALGO={{ zram_algo | default('zstd') }}
      PERCENT={{ zram_percent | default(50) }}
      PRIORITY={{ zram_priority | default(100) }}
  when: zram_enabled | default(false)
  notify: Restart zramswap

- name: Ensure zramswap service is enabled and started
  ansible.builtin.systemd_service:
    name: zramswap.service
    enabled: true
    state: started
  when: zram_enabled | default(false)
