# Copy to inventory.ini (gitignored) and edit.
#
#   cp inventory.example.ini inventory.ini
#
[devbox]
mybox ansible_host=YOUR.SERVER.IP

[devbox:vars]
# ── FIRST run only: connect as root (Hetzner's default fresh-box user). ──
ansible_user=root
#
# After the first successful run, the `security` role disables root SSH login.
# Comment the line above and switch to your operator user for all later runs:
#
#   ansible_user=dev      # must match operator_user in group_vars/all.yml
#
ansible_python_interpreter=/usr/bin/python3
