---
# ============================================================================
#  claude-devbox configuration  —  copy to all.yml (gitignored) and edit.
#
#    cp group_vars/all.example.yml group_vars/all.yml
#
#  v2 model: each PROFILE is its own Linux user — isolated $HOME, SSH key, git
#  identity, Claude login, and always-on Remote Control servers. Runtimes are
#  installed once (via mise) and shared. The one manual step is a `/login` per
#  profile (Remote Control needs interactive OAuth) — see docs/multi-account.md.
# ============================================================================

# ── Admin user (Ansible connects as this; has sudo). NOT a Claude profile. ────
operator_user: admin
operator_ssh_pubkey: "ssh-ed25519 AAAA...REPLACE_ME you@client"
operator_private_key_path: "~/.ssh/id_ed25519" # for the pre-hardening probe

# ── Box tuning ────────────────────────────────────────────────────────────────
swap_file: /swapfile
swap_size: 4G

# ── Private networking ────────────────────────────────────────────────────────
# Use a REUSABLE, NON-ephemeral key (https://login.tailscale.com/admin/settings/keys).
tailscale_authkey: "tskey-auth-REPLACE_ME"
# Host the `devbox-*` ssh aliases (mosh / plain ssh / VS Code / Zed) connect to, set
# by gen-editor-config.py. Pin the box's Tailscale IP (or MagicDNS name) here: mosh's
# UDP range is opened on tailscale0 ONLY, so connecting over the public IP fails with
# "Nothing received from server on UDP port". Provisioning still uses inventory.ini's
# ansible_host (the public IP). Leave unset to use the public IP for connect too.
#connect_host: "100.x.y.z"

# ── Runtimes (installed ONCE via mise, shared by all profiles) ────────────────
#  Tools resolve on every profile's PATH — including Claude's non-interactive
#  Bash tool — via /opt/mise/shims. Set a version, "lts", or "latest".
runtimes:
  node: "lts"
  python: "3.12"
  bun: "latest"
  uv: "latest"

# ── Profiles ──────────────────────────────────────────────────────────────────
#  Each profile = one Linux user = one Claude account = one git identity.
#  IMPORTANT — read docs/multi-account.md: use separate profiles only for
#  accounts you SEPARATELY and LEGITIMATELY pay for. Not for dodging rate limits.
profiles:
  - user: work # Linux username for this profile
    git_name: "Your Name"
    git_email: "you@work.example"
    # sudo: true   # opt this profile into passwordless (NOPASSWD) full sudo on the box.
                  # Default false: profiles are unprivileged for isolation. Flipping it
                  # back to false (or removing it) revokes sudo on the next playbook run.
    # An ed25519 SSH key is generated at /home/work/.ssh/id_ed25519 — add the
    # printed PUBLIC key to THIS profile's GitHub account (docs/multi-project.md).
    projects:
      - name: app
        repo: "git@github.com:work-org/app.git"
        branch: main
        install: true # run `bun install` after clone
        update: false # don't git-pull over Claude's local edits
        ports: [5173, 3000]
    servers: # always-on Remote Control servers (one per project) for the phone
      - project: app
        name: "Work · app" # title shown in the phone app
        spawn: worktree # worktree | same-dir | session
        capacity: 4 # Claude's flag default is 32; 4 is gentler on RAM

    # ── File bridge (optional) — see docs/file-bridge.md ──────────────────────
    # Lazy, read-only, full-depth windows onto client paths. The box mounts these
    # at /home/<user>/mnt/<label> while your client is online (gone when it sleeps).
    # Declared here; gen-editor-config.py propagates them to the client CLI config.
    # lazy_mounts:
    #   - { label: desktop,   path: "~/Desktop" }
    #   - { label: documents, path: "~/Documents" }
    # lazy_mount_on_connect: true   # auto `devbox mount up` when you connect
    #
    # Two-way sync "disk" (~/devbox/<user> <-> /home/<user>/sync). Drop folders in;
    # they stay on the box when the client is closed.
    # sync_disk: true
    # sync_engine: mutagen          # mutagen (default) | syncthing (provision: --tags syncthing)

  # - user: personal
  #   git_name: "Your Name"
  #   git_email: "you@personal.example"
  #   projects:
  #     - { name: side, repo: "git@github.com:me/side.git", branch: main }
  #   servers:
  #     - { project: side, name: "Personal · side", spawn: worktree, capacity: 2 }

# ── Claude config sync (skills / agents / commands / CLAUDE.md / mcp.json) ─────
#  Mirrors a CURATED, portable subset of your local ~/.claude and copies it into
#  EVERY profile's ~/.claude — never touching per-profile identity. Run
#  scripts/bundle-local-config.sh first. READ docs/config-sync.md.
sync_claude_config: true
claude_config_src: "{{ playbook_dir }}/../claude-config/shared"
claude_sync_settings: false # settings.json/hooks are machine-coupled; opt in

# ── Server-side headless browser use (ON by default) ─────────────────────────
#  Installs Google Chrome and wires Playwright + Chrome DevTools MCP into every
#  profile, so the agent on the box can drive a headless browser (navigate/click/
#  snapshot, console + network) and do deeper debugging (performance traces / Web
#  Vitals, throttling) — e.g. to test your web app. This is NOT
#  "Claude in Chrome" (that extension is client-side, on your client). For sites
#  that block datacenter IPs / throw CAPTCHAs you'd add a stealth/proxy layer
#  (Steel, Browserbase) on top. Set to false to skip Chrome + Playwright.
browser_automation: true

# ── Long-term agent memory: Vectorize Hindsight (ON by default) ────────────────
#  Wires Hindsight into Claude Code per profile: a UserPromptSubmit hook recalls
#  relevant memories into context; a Stop hook retains new facts after each response.
#  Runs fully local per profile (uvx hindsight-embed daemon, port 9077); ONLY the LLM
#  extraction/recall calls leave the box. Memory is ONE profile-wide bank (it remembers
#  you across ALL your projects — personal-assistant style), auto-tagged with
#  source/profile/project so you can filter it later via the agent_knowledge_* tools.
#  Requires `uv` in runtimes (the daemon runs via uvx). READ docs/memory.md.
hindsight_enabled: true
#  LLM provider for memory extraction/recall — generic, any Hindsight-supported
#  provider (openai | anthropic | gemini | groq | ollama | openrouter | ...), including
#  a custom OpenAI-compatible endpoint via hindsight_llm_base_url.
hindsight_llm_provider: "openrouter"
hindsight_llm_api_key: "REPLACE_ME" # required, except keyless providers (ollama/local)
hindsight_llm_model: "openai/gpt-4o-mini" # any model the provider serves ("" = provider default)
hindsight_llm_base_url: "" # optional custom OpenAI-compatible endpoint ("" = provider default)
#  Base port for the per-profile local daemon (loopback). Each profile gets base+index
#  (9077, 9078, …) so multiple profiles don't collide. Single profile stays on 9077.
# hindsight_base_port: 9077
#  Expose the per-profile Hindsight daemon to your TAILNET (never public): a socat
#  proxy per profile on 0.0.0.0:(expose_base+index), UFW-scoped to tailscale0 only.
#  Lets you query/browse memory from your client over Tailscale. Auth is tailnet-only
#  (the daemon has none — rely on your Tailscale ACLs). Default off (loopback only).
# hindsight_expose_tailscale: false
# hindsight_expose_base_port: 19077   # external (tailnet) base port; profile gets base+index
#  Escape hatch: true = isolated per-project banks instead of one tagged profile bank.
#  Default false (profile-wide + tags) — per-project fragments personal-assistant memory.
# hindsight_per_project: false

# ── Roaming-resilient terminal: mosh (+ tmux) (ON by default) ─────────────────
#  Installs mosh and opens its UDP range on the tailscale0 interface only. mosh
#  survives network drops / IP changes (mobile, switching networks) and tmux keeps `claude`
#  alive on the box across reconnects — the resilient alternative to Claude
#  Desktop's integrated SSH remote (which drops the session on disconnect). Connect
#  with: mosh <user>@<tailscale-name> -- tmux new -A -s main  (then run `claude`).
#  NOTE: mosh's predictive echo can drop/garble keystrokes on some macOS clients (a
#  known, unfixed mosh issue) — if you hit that, set mosh_enabled: false and use
#  Eternal Terminal (et_enabled) below instead. The `devbox` CLI auto-prefers et.
mosh_enabled: true

# ── Eternal Terminal (et) — TCP auto-reconnecting shell (OPT-IN) ──────────────
#  Same roaming + tmux persistence as mosh, but TCP and WITHOUT predictive echo, so
#  keystrokes stay clean (no drops) — the fix when mosh misbehaves on macOS. Installs
#  etserver from its PPA and opens TCP 2022 on the tailscale0 interface only. The
#  `devbox` CLI uses `et` automatically when it's installed locally (brew install et).
# et_enabled: true

#  UTF-8 locale(s) to generate on the box (mosh-server adopts the client's locale).
#  The `devbox` connect command pins LC_ALL to the FIRST entry client-side, so a
#  client forwarding a locale Linux can't make (e.g. macOS en_TR.UTF-8) still works.
#  Keep en_US.UTF-8 first (a Turkish working locale's dotless-i breaks build tools).
locales:
  - en_US.UTF-8

# ── Optional cleanup (all OFF by default) ─────────────────────────────────────
# Remove superseded mise tool versions after a runtime bump (frees disk):
mise_prune: false
# Declarative removal of profiles/servers you DELETED from this file. It NEVER runs
# on a normal `ansible-playbook playbook.yml` — only via `--tags prune`, which by
# itself just removes orphaned services (and only ones claude-devbox created). It
# lists what it will remove and asks for an interactive 'yes' first. The flags below
# gate the destructive parts:
prune_removed_users: false # also delete Linux user accounts no longer listed above
remove_profile_home: false # when deleting a user, also wipe its /home (DESTROYS DATA)
# prune_assume_yes / prune_force_empty are runtime-only escape hatches (-e ...):
#   -e prune_assume_yes=true   skip the interactive prompt (for non-interactive runs)
#   -e prune_force_empty=true  allow removing ALL services when none are declared
